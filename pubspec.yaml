name: awn
description: عون — منصة لربط ذوي الإعاقة بالمتطوعين في الأردن.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
